name: geoip-refresh

# Rebuild the :latest image weekly with a fresh GeoLite2 database and redeploy,
# keeping GeoIP data current without needing a code release.
on:
  schedule:
    - cron: "0 6 * * 0" # Sundays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/dmellok/tesserae-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download GeoLite2 database
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p data
          curl -fsSL "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz" -o geoip.tar.gz
          tar -xzf geoip.tar.gz --strip-components=1 --wildcards '*/GeoLite2-City.mmdb'
          mv GeoLite2-City.mmdb data/geoip.mmdb
          test -s data/geoip.mmdb

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push latest
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/tesserae-api
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Smoke test
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            if curl -fsS https://api.tesserae.ink/version/latest >/dev/null; then
              echo "smoke test passed"
              exit 0
            fi
            echo "attempt $i failed, retrying in 10s"
            sleep 10
          done
          echo "smoke test failed: /version/latest did not return 200"
          exit 1
